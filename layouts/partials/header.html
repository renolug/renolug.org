<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{{ "/" | relURL }}">
      <span class="brand-mark" aria-hidden="true">&gt;_</span>
      <span class="brand-text">Reno Linux Users Group</span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
      <label for="nav-toggle" class="nav-toggle-btn" aria-label="Toggle menu">☰</label>
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
          {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
          <li><a href="{{ .URL }}"{{ if $active }} class="active" aria-current="page"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
